# =============================================================================
# pre-commit hooks cho Terraform
# Doc: https://github.com/antonbabenko/pre-commit-terraform
# Cài: pip install pre-commit && pre-commit install
# Chạy thử all: pre-commit run --all-files
# =============================================================================

repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      # Format toàn bộ .tf theo chuẩn HashiCorp
      - id: terraform_fmt

      # Validate syntax + reference (cần init trước; hook tự skip nếu chưa init)
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true

      # Lint HCL + AWS convention (đọc .tflint.hcl ở root)
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      # Security scan AWS misconfig (S3 public, KMS, ...)
      - id: terraform_tfsec
        args:
          - --args=--soft-fail=false

      # Tự sinh bảng Inputs/Outputs vào README.md của mỗi module
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=false

  # Hook chung — trim whitespace + check yaml/json
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^policies/.*\.json$  # policies có comment-like, để tool khác kiểm
      - id: check-merge-conflict
      - id: detect-private-key
